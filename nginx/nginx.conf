# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Bxdc.ai Nginx — reverse proxy + static file server                 ║
# ║  Optimised for intranet x86_64 servers (no HTTPS required)          ║
# ╚══════════════════════════════════════════════════════════════════════╝

worker_processes      auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # ── Performance ────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    reset_timedout_connection on;

    # ── Gzip ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/javascript text/xml text/x-component
        application/json application/javascript application/x-javascript
        application/xml application/rss+xml application/atom+xml
        application/vnd.ms-fontobject font/truetype font/opentype
        image/svg+xml;

    # ── Upstream: backend API (multiple instances for load-balancing) ──
    upstream backend {
        least_conn;

        server backend:8000 weight=1 max_fails=3 fail_timeout=30s;
        # Scale-out: add more replicas by adding more lines below, e.g.:
        # server backend_2:8000 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # ── Buffer / timeout tuning for LLM streaming ──────────────────────
    proxy_buffering             off;          # essential for SSE streaming
    proxy_request_buffering     off;
    proxy_read_timeout          600s;         # long inference can take minutes
    proxy_connect_timeout       10s;
    proxy_send_timeout          600s;
    proxy_http_version          1.1;
    proxy_set_header Connection "";           # keep-alive to upstream

    # ── Header forwarding ──────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Client body ────────────────────────────────────────────────────
    client_max_body_size    64m;    # allow large multimodal payloads
    client_body_buffer_size 256k;

    # ── Server: main entry point ───────────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ── Security headers ──────────────────────────────────────────
        add_header X-Frame-Options         "SAMEORIGIN"  always;
        add_header X-Content-Type-Options  "nosniff"     always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── Static assets: long-term cache ────────────────────────────
        location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
            expires        365d;
            add_header     Cache-Control "public, immutable";
            access_log     off;
            try_files      $uri =404;
        }

        # ── Backend admin & public API ─────────────────────────────────
        location /api/ {
            proxy_pass http://backend/api/;
        }

        # ── OpenAI-compatible proxy endpoint ──────────────────────────
        # Disable buffering here — LLM streaming uses SSE (text/event-stream)
        location /v1/ {
            proxy_pass              http://backend/v1/;
            proxy_buffering         off;
            proxy_cache             off;
            chunked_transfer_encoding on;

            # Ensure nginx does not time out long-running inference
            proxy_read_timeout      900s;
            proxy_send_timeout      900s;
        }

        # ── Frontend SPA fallback ─────────────────────────────────────
        # All other paths → React app (client-side routing)
        location / {
            try_files $uri $uri/ /index.html;

            # HTML must not be cached so the browser always gets the latest
            # hashed asset filenames from the SPA shell
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            add_header Expires       "0";
        }

        # ── Health check (for docker-compose healthcheck + LB probes) ─
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }
    }
}
